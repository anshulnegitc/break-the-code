    <div class="relative w-full h-screen bg-[#050B12] font-sans flex flex-col items-center justify-center text-center p-4 overflow-hidden">
      <!-- Background Layers -->
      <div class="absolute inset-0 z-0">
        <!-- Grid -->
        <div class="absolute inset-0 bg-[linear-gradient(to_right,rgba(0,255,120,0.08)_1px,transparent_1px),linear-gradient(to_bottom,rgba(0,255,120,0.08)_1px,transparent_1px)] bg-[size:30px_30px] sm:bg-[size:40px_40px]"></div>
        
        <!-- Radar - Responsive sizes -->
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-[80vw] h-[80vw] sm:w-[60vw] sm:h-[60vw] md:w-[50vw] md:h-[50vw] lg:w-[40vw] lg:h-[40vw] max-w-[600px] max-h-[600px] rounded-full border border-[rgba(0,255,120,0.15)] relative animate-radar-spin">
             <div class="absolute top-0 left-1/2 w-[1px] h-1/2 bg-gradient-to-b from-[rgba(0,255,120,0.5)] to-transparent -translate-x-1/2 origin-bottom rotate-0"></div>
            </div>
        </div>
      </div>

      <!-- Content -->
      <div class="relative z-10 flex flex-col items-center w-full max-w-4xl p-safe">
        <!-- Status Label -->
        <div class="text-[#00FF88] text-[11px] sm:text-xs tracking-[0.4em] uppercase mb-2 sm:mb-4">Naval Intelligence Command</div>
        
        <!-- Title - Clamp as requested -->
        <h1 class="text-[clamp(42px,12vw,72px)] font-black text-white leading-none tracking-tighter mb-4">BREAK THE CODE</h1>
        
        <!-- Subtitle -->
        <p class="text-[14px] sm:text-lg text-[#AAB4C0] tracking-widest uppercase mb-8 sm:mb-12">Break their code. Save the fleet.</p>
        
        <!-- Mission Card -->
        <div class="border border-[rgba(0,255,120,0.3)] bg-black/40 p-4 sm:p-8 mb-8 sm:mb-12 font-mono text-left w-[90%] max-w-[500px] text-[#AAB4C0] rounded-lg text-sm sm:text-base mobile-adjust">
          <p class="mb-2 sm:mb-4 text-[#00FF88]">INTERCEPTED SIGNAL DETECTED</p>
          <p class="mb-2 sm:mb-4">Enemy fleet activity has been detected. Encrypted transmissions are being analyzed.</p>
          <p>Awaiting codebreaker...<span class="animate-pulse">_</span></p>
        </div>
        
        <!-- Action Button -->
        <button (click)="startMission()" class="w-[90%] max-w-[320px] h-[56px] flex items-center justify-center bg-[#00FF88] text-black font-bold uppercase tracking-widest hover:scale-105 transition-transform duration-300 cursor-pointer">Start Mission</button>
        
        <!-- Footer -->
        <div class="text-[#AAB4C0] text-[10px] sm:text-sm tracking-widest mt-12 sm:mt-16">OPERATION STATUS: STANDBY</div>
      </div>
    </div>
